<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>📚 読書リール生成ツール</title>

<style>

body{
font-family:sans-serif;
background:#f4f4f4;
max-width:900px;
margin:auto;
padding:40px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
margin-right:10px;
margin-bottom:10px;
}

pre{
background:#111;
color:#0f0;
padding:20px;
overflow:auto;
margin-top:20px;
}

iframe{
width:320px;
height:480px;
border:none;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
border-radius:16px;
}

</style>

</head>

<body>

<h1>📚 読書リール生成ツール</h1>

<label>Amazon URL</label>
<input id="amazonURL">

<button onclick="fetchAmazon()">Amazon情報取得</button>

<label>タイトル</label>
<input id="title">

<label>著者</label>
<input id="author">

<label>書影URL</label>
<input id="image">

<label>記事URL（Notionなど）</label>
<input id="article">

<h3>スライド文章</h3>

<textarea class="slide"></textarea>
<textarea class="slide"></textarea>
<textarea class="slide"></textarea>
<textarea class="slide"></textarea>
<textarea class="slide"></textarea>
<textarea class="slide"></textarea>

<button onclick="createHTML()">HTML作成</button>
<button onclick="previewHTML()">プレビュー</button>
<button onclick="downloadHTML()">HTMLダウンロード</button>
<button onclick="clearForm()">入力クリア</button>

<pre id="output"></pre>

<iframe id="previewFrame"></iframe>

<script>

let html=""

function fetchAmazon(){

const url=document.getElementById("amazonURL").value

if(!url){
alert("Amazon URLを入力してください")
return
}

const decoded=decodeURIComponent(url)

let slug=""

try{
slug=decoded.split("amazon.co.jp/")[1].split("/")[0]
}catch{
alert("URL解析できません")
return
}

const parts=slug.split("-")

let author=""
if(parts.length>=2){
author=parts.slice(-2).join(" ")
}

let title=""
if(parts.length>2){
title=parts.slice(0,parts.length-2).join(" ")
}

const asinMatch=url.match(/(?:dp|product)\/([A-Z0-9]{10})/)

let imageURL=""

if(asinMatch){
const asin=asinMatch[1]
imageURL=`https://images-na.ssl-images-amazon.com/images/P/${asin}.jpg`
}

document.getElementById("title").value=title
document.getElementById("author").value=author

if(imageURL){
document.getElementById("image").value=imageURL
}

}

function createHTML(){

const title=document.getElementById("title").value
const author=document.getElementById("author").value
const image=document.getElementById("image").value
const article=document.getElementById("article").value

const slideInputs=document.querySelectorAll(".slide")

let slides=[]

slideInputs.forEach(s=>{
if(s.value.trim()!==""){
slides.push("`"+s.value.replace(/\n/g,"<br>").replace(/`/g,"") +"`")
}
})

let slideCode=slides.join(",")

html=`<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:320px;
height:480px;
background:white;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
position:relative;
}

.dots{
position:absolute;
top:15px;
display:flex;
gap:6px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:#ccc;
}

.dot.active{
background:black;
}

.book{
display:none;
flex-direction:column;
align-items:center;
}

.book img{
width:150px;
}

.button{
margin-top:10px;
padding:10px 18px;
border-radius:20px;
background:black;
color:white;
text-decoration:none;
}

.replay{
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="dots" id="dots"></div>

<div id="text"></div>

<div id="book" class="book">

<img src="${image}">

<div>${title}</div>
<div>${author}</div>

<a class="button" href="${article}" target="_blank">
感想記事を読む
</a>

<div class="replay" onclick="restartReel()">
▶ もう一度見る
</div>

</div>

</div>

<script>

const scenes=[${slideCode}]

let index=0

const text=document.getElementById("text")
const book=document.getElementById("book")
const dots=document.getElementById("dots")

scenes.forEach(()=>{
const d=document.createElement("div")
d.className="dot"
dots.appendChild(d)
})

function updateDots(){

const all=document.querySelectorAll(".dot")

all.forEach((d,i)=>{
d.classList.toggle("active",i===index)
})

}

function showScene(){

if(index < scenes.length){

text.innerHTML=scenes[index]

updateDots()

index++

}else{

text.style.display="none"
book.style.display="flex"

clearInterval(timer)

}

}

function restartReel(){

index=0
book.style.display="none"
text.style.display="block"

timer=setInterval(showScene,3000)
showScene()

}

let timer=setInterval(showScene,3000)

showScene()

<\/script>

</body>
</html>`

document.getElementById("output").textContent=html

}

function previewHTML(){

if(html===""){
alert("先にHTML作成を押してください")
return
}

document.getElementById("previewFrame").srcdoc=html

}

function downloadHTML(){

if(html===""){
alert("先にHTML作成を押してください")
return
}

const blob=new Blob([html],{type:"text/html"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="reel.html"

a.click()

}

function clearForm(){

document.querySelectorAll("input,textarea").forEach(el=>el.value="")

document.getElementById("output").textContent=""
document.getElementById("previewFrame").srcdoc=""

html=""

}

</script>

</body>
</html>
