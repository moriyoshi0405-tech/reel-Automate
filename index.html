<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>📚 読書リール生成ツール</title>

<style>

body{
font-family:sans-serif;
background:#f4f4f4;
max-width:900px;
margin:auto;
padding:40px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
margin-right:10px;
margin-bottom:10px;
}

pre{
background:#111;
color:#0f0;
padding:20px;
overflow:auto;
margin-top:20px;
}

iframe{
width:320px;
height:480px;
border:none;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
border-radius:16px;
}

</style>

</head>

<body>

<h1>📚 読書リール生成ツール</h1>

<label>Amazon URL</label>
<input id="amazonURL">

<button onclick="fetchAmazon()">Amazon情報取得</button>

<label>タイトル</label>
<input id="title">

<label>著者</label>
<input id="author">

<label>書影URL</label>
<input id="image">

<label>記事URL</label>
<input id="article">

<h3>スライド文章</h3>

<textarea id="s1"></textarea>
<textarea id="s2"></textarea>
<textarea id="s3"></textarea>
<textarea id="s4"></textarea>
<textarea id="s5"></textarea>
<textarea id="s6"></textarea>

<button onclick="createHTML()">HTML作成</button>
<button onclick="downloadHTML()">HTMLダウンロード</button>
<button onclick="previewHTML()">プレビュー</button>
<button onclick="clearForm()">入力クリア</button>

<pre id="output"></pre>

<iframe id="previewFrame"></iframe>

<script>

let html=""

async function fetchAmazon(){

const url=document.getElementById("amazonURL").value

if(!url){
alert("Amazon URLを入力してください")
return
}

const asinMatch=url.match(/(?:dp|product)\/([A-Z0-9]{10})/)

if(!asinMatch){
alert("ASINが取得できませんでした")
return
}

const asin=asinMatch[1]

const imageURL=`https://images-na.ssl-images-amazon.com/images/P/${asin}.jpg`

document.getElementById("image").value=imageURL

try{

const proxy="https://api.allorigins.win/raw?url="+encodeURIComponent(url)

const res=await fetch(proxy)

const htmlText=await res.text()

const parser=new DOMParser()

const doc=parser.parseFromString(htmlText,"text/html")

const title=doc.querySelector("#productTitle")?.innerText.trim()

const author=doc.querySelector(".author a")?.innerText.trim()

if(title) document.getElementById("title").value=title

if(author) document.getElementById("author").value=author

}catch(e){

console.log("タイトル取得失敗")

}

}

function createHTML(){

const title=document.getElementById("title").value
const author=document.getElementById("author").value
const image=document.getElementById("image").value
const article=document.getElementById("article").value

const slides=[
document.getElementById("s1").value,
document.getElementById("s2").value,
document.getElementById("s3").value,
document.getElementById("s4").value,
document.getElementById("s5").value,
document.getElementById("s6").value
]

let slideCode=""

slides.forEach(function(s){

if(s.trim()!=""){

slideCode+=`"<div>${s.replace(/\n/g,"<br>")}</div>",`

}

})

html=`<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:320px;
height:480px;
background:white;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

.book{
display:none;
flex-direction:column;
align-items:center;
}

.book img{
width:150px;
}

.button{
margin-top:10px;
padding:10px 18px;
border-radius:20px;
background:black;
color:white;
text-decoration:none;
}

.replay{
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div id="text"></div>

<div id="book" class="book">

<img src="${image}">

<div>${title}</div>
<div>${author}</div>

<a class="button" href="${article}" target="_blank">
感想記事を読む
</a>

<div class="replay" onclick="restartReel()">
▶ もう一度見る
</div>

</div>

</div>

<script>

const scenes=[${slideCode}]

let index=0

const text=document.getElementById("text")
const book=document.getElementById("book")

function showScene(){

if(index < scenes.length){

text.innerHTML=scenes[index]

index++

}else{

text.style.display="none"
book.style.display="flex"

clearInterval(timer)

}

}

function restartReel(){

index=0
book.style.display="none"
text.style.display="block"

timer=setInterval(showScene,3000)
showScene()

}

let timer=setInterval(showScene,3000)

showScene()

<\/script>

</body>
</html>`

document.getElementById("output").textContent=html

}

function downloadHTML(){

if(html===""){

alert("先にHTML作成を押してください")
return

}

const blob=new Blob([html],{type:"text/html"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="reel.html"

a.click()

}

function previewHTML(){

if(html===""){

alert("先にHTML作成を押してください")
return

}

document.getElementById("previewFrame").srcdoc=html

}

function clearForm(){

document.querySelectorAll("input,textarea").forEach(el=>el.value="")

document.getElementById("output").textContent=""

document.getElementById("previewFrame").srcdoc=""

html=""

}

</script>

</body>
</html>
