<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>📚 読書リール生成ツール</title>

<style>

body{
font-family:sans-serif;
background:#f4f4f4;
max-width:900px;
margin:auto;
padding:40px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
margin-right:10px;
margin-bottom:10px;
}

iframe{
width:340px;
height:520px;
border:none;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
border-radius:16px;
}

pre{
background:#111;
color:#0f0;
padding:20px;
overflow:auto;
}

</style>

</head>

<body>

<h1>📚 読書リール生成ツール</h1>

<label>Amazon URL</label>
<input id="amazonURL">

<button onclick="fetchAmazon()">Amazon情報取得</button>

<label>タイトル</label>
<input id="title">

<label>著者</label>
<input id="author">

<label>書影URL</label>
<input id="image">

<label>記事URL</label>
<input id="article">

<h3>スライド文章</h3>

<textarea class="slide"></textarea>
<textarea class="slide"></textarea>
<textarea class="slide"></textarea>
<textarea class="slide"></textarea>
<textarea class="slide"></textarea>
<textarea class="slide"></textarea>

<button onclick="createHTML()">HTML作成</button>
<button onclick="previewHTML()">プレビュー</button>
<button onclick="downloadHTML()">HTMLダウンロード</button>
<button onclick="clearForm()">入力クリア</button>

<pre id="output"></pre>

<iframe id="previewFrame"></iframe>

<script>

let html=""

/* Amazon URL解析 */

function fetchAmazon(){

const url=document.getElementById("amazonURL").value

if(!url){
alert("Amazon URLを入力してください")
return
}

try{

const decoded=decodeURIComponent(url)

const slug=decoded.split("amazon.co.jp/")[1].split("/")[0]

const parts=slug.split("-")

let author=""
let title=""

if(parts.length>=2){

author=parts.slice(-2).join(" ")

}

if(parts.length>2){

title=parts.slice(0,parts.length-2).join(" ")

}

document.getElementById("title").value=title
document.getElementById("author").value=author

const asinMatch=url.match(/(?:dp|product)\/([A-Z0-9]{10})/)

if(asinMatch){

const asin=asinMatch[1]

document.getElementById("image").value=
"https://images-na.ssl-images-amazon.com/images/P/"+asin+".jpg"

}

}catch{

alert("URL解析できませんでした")

}

}

/* HTML生成 */

function createHTML(){

const title=document.getElementById("title").value
const author=document.getElementById("author").value
const image=document.getElementById("image").value
const article=document.getElementById("article").value

const slides=document.querySelectorAll(".slide")

let scenes=[]

slides.forEach((s,i)=>{

let text=s.value.trim()

if(text==="") return

text=text.replace(/\n/g,"<br>").replace(/`/g,"")

/* 1枚目と最後はbig */

if(i===0){

text=`<div class="big">${text}</div>`

}

/* 引用 */

else if(text.startsWith("「")){

text=`<div class="quote">${text}</div>`

}

/* 最後 */

else if(i===slides.length-1){

text=`<div class="big">${text}</div>`

}

scenes.push("`"+text+"`")

})
const sceneText=scenes.join(",\n")

html=`<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${title}</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Zen Kaku Gothic New',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:320px;
height:480px;
background:white;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
box-sizing:border-box;
position:relative;
}

.dots{
position:absolute;
top:14px;
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#ddd;
}

.dot.active{
background:black;
}

.text{
font-size:20px;
line-height:1.6;
opacity:0;
transform:translateY(10px);
transition:.7s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

.big{
font-size:24px;
font-weight:700;
}

.quote{
font-size:18px;
font-style:italic;
}

.book{
display:none;
flex-direction:column;
align-items:center;
}

.book img{
width:150px;
border-radius:6px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.title{
margin-top:10px;
font-weight:700;
}

.author{
font-size:13px;
opacity:.6;
}

.button{
margin-top:12px;
padding:10px 18px;
border-radius:20px;
background:black;
color:white;
text-decoration:none;
font-size:13px;
font-weight:700;
}

.replay{
margin-top:10px;
font-size:13px;
cursor:pointer;
opacity:.7;
}

.replay:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="card">

<div class="dots" id="dots"></div>

<div id="text" class="text"></div>

<div id="book" class="book">

<img src="${image}">

<div class="title">${title}</div>

<div class="author">${author}</div>

<a class="button"
href="${article}"
target="_blank">

感想記事を読む

</a>

<div class="replay" onclick="restartReel()">

▶ もう一度見る

</div>

</div>

</div>

<script>

const scenes=[

${sceneText}

]

let index=0

const text=document.getElementById("text")
const book=document.getElementById("book")
const dotsContainer=document.getElementById("dots")

let interval

scenes.forEach(()=>{

const dot=document.createElement("div")
dot.classList.add("dot")
dotsContainer.appendChild(dot)

})

const dots=document.querySelectorAll(".dot")

function updateDots(){

dots.forEach((d,i)=>{

d.classList.toggle("active",i<=index)

})

}

function showScene(){

if(index < scenes.length){

book.style.display="none"
text.style.display="block"

text.classList.remove("show")

setTimeout(()=>{

text.innerHTML=scenes[index]

text.classList.add("show")

updateDots()

index++

},200)

}else{

text.style.display="none"
book.style.display="flex"

clearInterval(interval)

}

}

function restartReel(){

index=0
book.style.display="none"

interval=setInterval(showScene,5000)

showScene()

}

showScene()

interval=setInterval(showScene,5000)

<\/script>

</body>
</html>`

document.getElementById("output").textContent=html

}

/* プレビュー */

function previewHTML(){

document.getElementById("previewFrame").srcdoc=html

}

/* ダウンロード */

function downloadHTML(){

const blob=new Blob([html],{type:"text/html"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="reel.html"

a.click()

}

/* クリア */

function clearForm(){

document.querySelectorAll("input,textarea").forEach(el=>el.value="")

document.getElementById("output").textContent=""
document.getElementById("previewFrame").srcdoc=""

html=""

}

</script>

</body>
</html>
